id: fc-secret-tls
title: "create a TLS secret"
mode: flashcard
domain: security
references:
  - https://kubernetes.io/docs/concepts/configuration/secret/#tls-secrets

prompt: |
  Imperatively create a TLS secret named `web-tls` in namespace `web` from the
  files `tls.crt` and `tls.key`.
solution:
  commands:
    - "kubectl create secret tls web-tls -n web --cert=tls.crt --key=tls.key"
