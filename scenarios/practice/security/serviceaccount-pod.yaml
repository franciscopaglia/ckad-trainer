id: serviceaccount-pod
title: "Run a Pod as a ServiceAccount without token automount"
mode: practice
domain: security
weight: 1
estimated_minutes: 4
randomize: true
references:
  - https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/

params:
  saName: { pick: [deployer, reader, runner] }
  podName: { pattern: "sa-pod-{{randInt 100 999}}" }

prompt: |
  In `{{.ns}}`:
  1. Create a ServiceAccount `{{.saName}}`.
  2. Create a Pod `{{.podName}}` (image `busybox:1.36`, command `sleep 3600`)
     that runs as `{{.saName}}` AND disables API token automounting
     (`automountServiceAccountToken: false`).

hints:
  - "spec.serviceAccountName attaches the SA; automountServiceAccountToken false stops the token mount."
  - "kubectl create serviceaccount {{.saName}} -n {{.ns}}"

verify:
  - kind: ServiceAccount
    name: "{{.saName}}"
    assert:
      - path: "{.metadata.name}"
        equals: "{{.saName}}"
  - kind: Pod
    name: "{{.podName}}"
    assert:
      - path: "{.spec.serviceAccountName}"
        equals: "{{.saName}}"
      - path: "{.spec.automountServiceAccountToken}"
        equals: "false"

solution:
  description: |
    Disabling automount prevents the default token from being mounted into the
    Pod, reducing the blast radius if the container is compromised.
  manifests:
    - |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: {{.saName}}
        namespace: {{.ns}}
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: {{.podName}}
        namespace: {{.ns}}
      spec:
        restartPolicy: Never
        serviceAccountName: {{.saName}}
        automountServiceAccountToken: false
        containers:
          - name: app
            image: busybox:1.36
            command: ["sleep", "3600"]
