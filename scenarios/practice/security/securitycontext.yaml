id: securitycontext
title: "Set a Pod/container security context"
mode: practice
domain: security
weight: 1
estimated_minutes: 5
randomize: true
references:
  - https://kubernetes.io/docs/tasks/configure-pod-container/security-context/

params:
  podName: { pattern: "secctx-{{randInt 100 999}}" }
  runAsUser: { pick: ["1000", "2000", "65534"] }
  runAsGroup: { pick: ["3000", "4000"] }
  fsGroup: { pick: ["2000", "3000"] }

variants:
  - name: pod-level
    weight: 1
    prompt: |
      In `{{.ns}}`, create a Pod `{{.podName}}` (image `busybox:1.36`, command
      `sleep 3600`) with a POD-level securityContext: `runAsUser {{.runAsUser}}`,
      `runAsNonRoot: true`, `fsGroup {{.fsGroup}}`.
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          - path: "{.spec.securityContext.runAsUser}"
            equals: "{{.runAsUser}}"
          - path: "{.spec.securityContext.runAsNonRoot}"
            equals: "true"
          - path: "{.spec.securityContext.fsGroup}"
            equals: "{{.fsGroup}}"

  - name: container-level
    weight: 1
    prompt: |
      In `{{.ns}}`, create a Pod `{{.podName}}` (image `busybox:1.36`, command
      `sleep 3600`) whose CONTAINER `app` has a securityContext with
      `runAsUser {{.runAsUser}}`, `allowPrivilegeEscalation: false`, and drops
      all Linux capabilities (`capabilities.drop: [ALL]`).
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          - path: "{.spec.containers[0].securityContext.runAsUser}"
            equals: "{{.runAsUser}}"
          - path: "{.spec.containers[0].securityContext.allowPrivilegeEscalation}"
            equals: "false"
          - path: "{.spec.containers[0].securityContext.capabilities.drop[*]}"
            contains: "ALL"

  - name: hardened
    weight: 1
    prompt: |
      In `{{.ns}}`, create a Pod `{{.podName}}` (image `busybox:1.36`, command
      `sleep 3600`) whose CONTAINER `app` is hardened: `runAsUser {{.runAsUser}}`,
      `runAsGroup {{.runAsGroup}}`, `readOnlyRootFilesystem: true`, and Linux
      capabilities `drop: [ALL]` then `add: [NET_BIND_SERVICE]`.
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          - path: "{.spec.containers[0].securityContext.runAsUser}"
            equals: "{{.runAsUser}}"
          - path: "{.spec.containers[0].securityContext.runAsGroup}"
            equals: "{{.runAsGroup}}"
          - path: "{.spec.containers[0].securityContext.readOnlyRootFilesystem}"
            equals: "true"
          - path: "{.spec.containers[0].securityContext.capabilities.add[*]}"
            contains: "NET_BIND_SERVICE"
          - path: "{.spec.containers[0].securityContext.capabilities.drop[*]}"
            contains: "ALL"

solution:
  description: |
    A pod-level securityContext applies to all containers (and fsGroup affects
    volume ownership); a container-level one overrides it for that container.
  manifests:
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: {{.podName}}
        namespace: {{.ns}}
      spec:
        restartPolicy: Never
        {{- if eq .variant "pod-level"}}
        securityContext:
          runAsUser: {{.runAsUser}}
          runAsNonRoot: true
          fsGroup: {{.fsGroup}}
        {{- end}}
        containers:
          - name: app
            image: busybox:1.36
            command: ["sleep", "3600"]
            {{- if eq .variant "container-level"}}
            securityContext:
              runAsUser: {{.runAsUser}}
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            {{- end}}
            {{- if eq .variant "hardened"}}
            securityContext:
              runAsUser: {{.runAsUser}}
              runAsGroup: {{.runAsGroup}}
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
                add: ["NET_BIND_SERVICE"]
            {{- end}}
