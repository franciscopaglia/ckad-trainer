id: pvc-dynamic
title: "Dynamically provision storage with a PVC"
mode: practice
domain: state-persistence
weight: 1
estimated_minutes: 5
randomize: true
references:
  - https://kubernetes.io/docs/concepts/storage/persistent-volumes/
  - https://kubernetes.io/docs/concepts/storage/dynamic-provisioning/

params:
  pvcName: { pick: [data, content, scratch] }
  size: { pick: ["128Mi", "256Mi"] }

prompt: |
  In `{{.ns}}`, create a PersistentVolumeClaim `{{.pvcName}}` that requests
  `{{.size}}` with access mode `ReadWriteOnce`, using the cluster's **default**
  StorageClass (don't name one). Then create a Pod `app` that mounts the claim
  at `/data`. The claim must become **Bound**.

hints:
  - "Leave storageClassName unset to use the default StorageClass."
  - "With WaitForFirstConsumer binding, the PVC stays Pending until a Pod uses it."
  - "kubectl get pvc {{.pvcName}} -n {{.ns}} -w"

verify:
  - kind: PersistentVolumeClaim
    name: "{{.pvcName}}"
    assert:
      - path: "{.spec.accessModes[0]}"
        equals: "ReadWriteOnce"
      - path: "{.spec.resources.requests.storage}"
        equals: "{{.size}}"
      - path: "{.status.phase}"
        equals: "Bound"
        wait: "120s"
  - kind: Pod
    name: app
    assert:
      - path: "{.spec.volumes[*].persistentVolumeClaim.claimName}"
        contains: "{{.pvcName}}"
      - path: "{.spec.containers[0].volumeMounts[*].mountPath}"
        contains: "/data"

solution:
  description: |
    A PVC requests storage by size + access mode; with no storageClassName it
    uses the default StorageClass, whose provisioner creates a PV on demand. Many
    default classes bind WaitForFirstConsumer, so the PVC only goes Bound once a
    consuming Pod is scheduled — which is why we create the Pod too.
  manifests:
    - |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: {{.pvcName}}
        namespace: {{.ns}}
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{.size}}
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: app
        namespace: {{.ns}}
      spec:
        containers:
          - name: app
            image: busybox:1.36
            command: ["sh", "-c", "sleep 3600"]
            volumeMounts:
              - name: vol
                mountPath: /data
        volumes:
          - name: vol
            persistentVolumeClaim:
              claimName: {{.pvcName}}
