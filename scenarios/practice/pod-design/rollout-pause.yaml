id: rollout-pause
title: "Pause a Deployment rollout"
mode: practice
domain: pod-design
weight: 1
estimated_minutes: 3
randomize: true
references:
  - https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#pausing-and-resuming-a-deployment

params:
  appName: { pick: [web, api, batch] }

setup:
  manifests:
    - |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{.appName}}
        namespace: {{.ns}}
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: {{.appName}}
        template:
          metadata:
            labels:
              app: {{.appName}}
          spec:
            containers:
              - name: web
                image: nginx:1.27

prompt: |
  In `{{.ns}}`, pause the rollout of Deployment `{{.appName}}` so that further
  changes to its Pod template don't trigger a new rollout until you resume it.

hints:
  - "kubectl rollout pause deployment/{{.appName}} -n {{.ns}}"
  - "while paused, spec.paused is true and edits queue up until `rollout resume`."

verify:
  - kind: Deployment
    name: "{{.appName}}"
    assert:
      - path: "{.spec.paused}"
        equals: "true"

solution:
  description: |
    Pausing lets you batch several edits (image, resources, env) and roll them
    out together when you resume, instead of one rollout per change.
  commands:
    - "kubectl rollout pause deployment/{{.appName}} -n {{.ns}}"
