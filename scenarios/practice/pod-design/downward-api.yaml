id: downward-api
title: "Expose Pod metadata with the downward API"
mode: practice
domain: pod-design
weight: 1
estimated_minutes: 5
randomize: true
references:
  - https://kubernetes.io/docs/tasks/inject-data-application/downward-api-volume-expose-pod-information/

params:
  podName: { pattern: "downward-{{randInt 100 999}}" }

variants:
  - name: env
    weight: 1
    prompt: |
      In `{{.ns}}`, create a Pod `{{.podName}}` (image `busybox:1.36`, command
      `sleep 3600`) that exposes its own name as env var `POD_NAME` and its
      namespace as `POD_NAMESPACE`, using the downward API (`fieldRef`).
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          - path: '{.spec.containers[0].env[?(@.name=="POD_NAME")].valueFrom.fieldRef.fieldPath}'
            equals: "metadata.name"
          - path: '{.spec.containers[0].env[?(@.name=="POD_NAMESPACE")].valueFrom.fieldRef.fieldPath}'
            equals: "metadata.namespace"

  - name: volume
    weight: 1
    prompt: |
      In `{{.ns}}`, create a Pod `{{.podName}}` (image `busybox:1.36`, command
      `sleep 3600`) with a `downwardAPI` volume mounted at `/podinfo` that writes
      the Pod name to a file `name` (fieldRef `metadata.name`).
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          - path: "{.spec.volumes[0].downwardAPI.items[0].fieldRef.fieldPath}"
            equals: "metadata.name"
          - path: "{.spec.volumes[0].downwardAPI.items[0].path}"
            equals: "name"
          - path: '{.spec.containers[0].volumeMounts[?(@.mountPath=="/podinfo")].name}'
            exists: true

solution:
  description: |
    The downward API surfaces Pod/container metadata to the app, either as env
    vars (valueFrom.fieldRef) or as files in a downwardAPI volume.
  manifests:
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: {{.podName}}
        namespace: {{.ns}}
      spec:
        restartPolicy: Never
        containers:
          - name: app
            image: busybox:1.36
            command: ["sleep", "3600"]
            {{- if eq .variant "env"}}
            env:
              - name: POD_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.name
              - name: POD_NAMESPACE
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.namespace
            {{- end}}
            {{- if eq .variant "volume"}}
            volumeMounts:
              - name: podinfo
                mountPath: /podinfo
            {{- end}}
        {{- if eq .variant "volume"}}
        volumes:
          - name: podinfo
            downwardAPI:
              items:
                - path: name
                  fieldRef:
                    fieldPath: metadata.name
        {{- end}}
