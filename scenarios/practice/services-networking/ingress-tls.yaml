id: ingress-tls
title: "Terminate TLS at an Ingress"
mode: practice
domain: services-networking
weight: 1
estimated_minutes: 5
randomize: true
references:
  - https://kubernetes.io/docs/concepts/services-networking/ingress/#tls

params:
  host: { pick: ["app.example.com", "shop.local", "secure.test"] }
  ingName: { pick: [web-ing, site-ing] }
  secretName: { pick: [tls-cert, web-tls] }

# The backend Service already exists; the task is to put an Ingress in front of
# it that terminates HTTPS for one host using a TLS Secret.
setup:
  manifests:
    - |
      apiVersion: v1
      kind: Service
      metadata:
        name: web
        namespace: {{.ns}}
      spec:
        selector:
          app: web
        ports:
          - port: 80
            targetPort: 80

prompt: |
  In `{{.ns}}`, Service `web` (port 80) already exists. Create an Ingress
  `{{.ingName}}` that terminates TLS for host `{{.host}}` using the TLS Secret
  `{{.secretName}}`, routing path `/` (pathType `Prefix`) to `web:80`.

hints:
  - "spec.tls[] pairs a list of hosts with the secretName that holds the cert."
  - "The same host must also appear under spec.rules[].host for the route to match."

verify:
  - kind: Ingress
    name: "{{.ingName}}"
    assert:
      - path: "{.spec.tls[0].hosts[0]}"
        equals: "{{.host}}"
      - path: "{.spec.tls[0].secretName}"
        equals: "{{.secretName}}"
      - path: "{.spec.rules[0].host}"
        equals: "{{.host}}"
      - path: "{.spec.rules[0].http.paths[0].backend.service.name}"
        equals: "web"

solution:
  description: |
    The spec.tls block tells the Ingress controller to terminate HTTPS for the
    listed hosts using the cert/key stored in secretName (a kubernetes.io/tls
    Secret). The host must also appear in a routing rule so requests are matched
    and forwarded to the backend Service.
  manifests:
    - |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: {{.ingName}}
        namespace: {{.ns}}
      spec:
        tls:
          - hosts:
              - {{.host}}
            secretName: {{.secretName}}
        rules:
          - host: {{.host}}
            http:
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: web
                      port:
                        number: 80
