id: job-advanced
title: "Indexed Job with deadline and auto-cleanup"
mode: practice
domain: core-concepts
weight: 1
estimated_minutes: 5
randomize: true
references:
  - https://kubernetes.io/docs/concepts/workloads/controllers/job/#completion-mode

params:
  jobName: { pick: [indexer, batch, shard-run] }
  completions: { range: { min: 2, max: 5 } }
  deadline: { pick: ["60", "120", "300"] }
  ttl: { pick: ["100", "600"] }

prompt: |
  In `{{.ns}}`, create a Job `{{.jobName}}` (image `busybox:1.36`, command
  `sh -c 'exit 0'`) with:
    - `completionMode: Indexed`
    - `completions: {{.completions}}`, `parallelism: 2`
    - `activeDeadlineSeconds: {{.deadline}}`
    - `ttlSecondsAfterFinished: {{.ttl}}`

hints:
  - "Indexed mode gives each Pod a JOB_COMPLETION_INDEX; it requires completions."
  - "ttlSecondsAfterFinished lets the control plane delete the Job after it finishes."

verify:
  - kind: Job
    name: "{{.jobName}}"
    assert:
      - path: "{.spec.completionMode}"
        equals: "Indexed"
      - path: "{.spec.completions}"
        equals: "{{.completions}}"
      - path: "{.spec.activeDeadlineSeconds}"
        equals: "{{.deadline}}"
      - path: "{.spec.ttlSecondsAfterFinished}"
        equals: "{{.ttl}}"

solution:
  description: |
    Indexed completion runs completions Pods, each with a fixed index, useful for
    sharded work. activeDeadlineSeconds caps total runtime; ttlSecondsAfterFinished
    garbage-collects the finished Job.
  manifests:
    - |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: {{.jobName}}
        namespace: {{.ns}}
      spec:
        completionMode: Indexed
        completions: {{.completions}}
        parallelism: 2
        activeDeadlineSeconds: {{.deadline}}
        ttlSecondsAfterFinished: {{.ttl}}
        backoffLimit: 4
        template:
          spec:
            restartPolicy: Never
            containers:
              - name: work
                image: busybox:1.36
                command: ["sh", "-c", "exit 0"]
