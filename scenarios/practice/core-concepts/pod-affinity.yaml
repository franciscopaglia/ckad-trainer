# The anti-affinity variant uses preferredDuringScheduling on purpose: a
# required anti-affinity against the anchor Pod could never schedule on a
# single-node cluster, so Running would be unassertable.
id: pod-affinity
title: "Co-locate or spread Pods with pod (anti-)affinity"
mode: practice
domain: core-concepts
weight: 1
estimated_minutes: 6
randomize: true
references:
  - https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#inter-pod-affinity-and-anti-affinity

params:
  podName: { pattern: "placed-{{randInt 100 999}}" }
  anchorLabel: { pick: [cache, db, queue] }

# An anchor Pod the (anti-)affinity refers to already runs, labelled
# app={{.anchorLabel}}.
setup:
  manifests:
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: anchor
        namespace: {{.ns}}
        labels:
          app: {{.anchorLabel}}
      spec:
        restartPolicy: Never
        containers:
          - name: app
            image: busybox:1.36
            command: ["sleep", "3600"]

variants:
  - name: co-locate
    weight: 1
    prompt: |
      In `{{.ns}}`, a Pod labelled `app={{.anchorLabel}}` is running. Create a
      Pod `{{.podName}}` (image `busybox:1.36`, command `sleep 3600`) that MUST
      run on the same node as it: a **required** podAffinity
      (`requiredDuringSchedulingIgnoredDuringExecution`) matching label
      `app={{.anchorLabel}}` with `topologyKey: kubernetes.io/hostname`.
      Confirm it reaches **Running**.
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          - path: "{.spec.affinity.podAffinity.requiredDuringSchedulingIgnoredDuringExecution[0].labelSelector.matchLabels.app}"
            equals: "{{.anchorLabel}}"
          - path: "{.spec.affinity.podAffinity.requiredDuringSchedulingIgnoredDuringExecution[0].topologyKey}"
            equals: "kubernetes.io/hostname"
          - path: "{.status.phase}"
            equals: "Running"
            wait: "60s"

  - name: spread
    weight: 1
    prompt: |
      In `{{.ns}}`, a Pod labelled `app={{.anchorLabel}}` is running. Create a
      Pod `{{.podName}}` (image `busybox:1.36`, command `sleep 3600`) that
      should AVOID its node when possible: a **preferred** podAntiAffinity
      (`preferredDuringSchedulingIgnoredDuringExecution`, weight `100`)
      matching label `app={{.anchorLabel}}` with
      `topologyKey: kubernetes.io/hostname`. Confirm it reaches **Running**
      (preferred rules never block scheduling).
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          - path: "{.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].weight}"
            equals: "100"
          - path: "{.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.labelSelector.matchLabels.app}"
            equals: "{{.anchorLabel}}"
          - path: "{.spec.affinity.podAntiAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].podAffinityTerm.topologyKey}"
            equals: "kubernetes.io/hostname"
          - path: "{.status.phase}"
            equals: "Running"
            wait: "60s"

hints:
  - "affinity lives at pod.spec.affinity; anti-affinity's preferred terms wrap the selector in podAffinityTerm."
  - "topologyKey defines what 'same place' means — kubernetes.io/hostname = same node."

solution:
  description: |
    podAffinity attracts a Pod to nodes (topologyKey domains) already running
    Pods matching the selector; podAntiAffinity repels it. `required` rules are
    hard scheduling constraints; `preferred` rules are weighted wishes the
    scheduler can ignore — which is why the spread variant still runs on a
    single-node cluster.
  manifests:
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: {{.podName}}
        namespace: {{.ns}}
      spec:
        restartPolicy: Never
        affinity:
          {{- if eq .variant "co-locate"}}
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app: {{.anchorLabel}}
                topologyKey: kubernetes.io/hostname
          {{- end}}
          {{- if eq .variant "spread"}}
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app: {{.anchorLabel}}
                  topologyKey: kubernetes.io/hostname
          {{- end}}
        containers:
          - name: app
            image: busybox:1.36
            command: ["sleep", "3600"]
