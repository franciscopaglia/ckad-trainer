id: tolerations
title: "Add a toleration to a Pod"
mode: practice
domain: core-concepts
weight: 1
estimated_minutes: 3
randomize: true
references:
  - https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/

params:
  podName: { pattern: "tol-{{randInt 100 999}}" }
  key: { pick: [dedicated, gpu, spot] }
  value: { pick: [team-a, present, batch] }
  effect: { pick: [NoSchedule, NoExecute] }

prompt: |
  In `{{.ns}}`, create a Pod `{{.podName}}` (image `busybox:1.36`, command
  `sleep 3600`) that tolerates the taint `{{.key}}={{.value}}` with effect
  `{{.effect}}` (operator `Equal`).

hints:
  - "A toleration lets a Pod schedule onto nodes carrying a matching taint."
  - "key + value + effect must match the taint exactly; operator Equal compares the value."

verify:
  - kind: Pod
    name: "{{.podName}}"
    assert:
      - path: '{.spec.tolerations[?(@.key=="{{.key}}")].value}'
        equals: "{{.value}}"
      - path: '{.spec.tolerations[?(@.key=="{{.key}}")].effect}'
        equals: "{{.effect}}"
      - path: '{.spec.tolerations[?(@.key=="{{.key}}")].operator}'
        equals: "Equal"

solution:
  description: |
    Taints repel Pods from nodes; a matching toleration on the Pod lets it land
    there anyway. Tolerating a taint does not force scheduling — it only removes
    the repulsion.
  manifests:
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: {{.podName}}
        namespace: {{.ns}}
      spec:
        restartPolicy: Never
        tolerations:
          - key: "{{.key}}"
            operator: "Equal"
            value: "{{.value}}"
            effect: "{{.effect}}"
        containers:
          - name: app
            image: busybox:1.36
            command: ["sleep", "3600"]
