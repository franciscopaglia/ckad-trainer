id: nodeselector-schedule
title: "Schedule a Pod onto a labelled node"
mode: practice
domain: core-concepts
weight: 1
estimated_minutes: 3
randomize: true
references:
  - https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/

params:
  podName: { pattern: "pinned-{{randInt 100 999}}" }
  disktype: { pick: [ssd, fast, local] }

# The nodes have been labelled disktype={{.disktype}}.
setup:
  commands:
    - "kubectl label nodes --all disktype={{.disktype}} --overwrite"

# Remove the node label again — node state outlives the namespace.
cleanup:
  commands:
    - "kubectl label nodes --all disktype-"

prompt: |
  In `{{.ns}}`, create a Pod `{{.podName}}` (image `busybox:1.36`, command
  `sleep 3600`) that only schedules onto nodes labelled `disktype={{.disktype}}`,
  using a `nodeSelector`. Confirm it runs.

hints:
  - "nodeSelector is the simplest node-constraint: a map of label key=value the node must have."
  - "kubectl get nodes --show-labels"

verify:
  - kind: Pod
    name: "{{.podName}}"
    assert:
      - path: "{.spec.nodeSelector.disktype}"
        equals: "{{.disktype}}"
      - path: "{.status.phase}"
        equals: "Running"
        wait: "60s"

solution:
  description: |
    nodeSelector pins a Pod to nodes carrying matching labels. If no node has the
    label, the Pod stays Pending (unschedulable).
  manifests:
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: {{.podName}}
        namespace: {{.ns}}
      spec:
        restartPolicy: Never
        nodeSelector:
          disktype: {{.disktype}}
        containers:
          - name: app
            image: busybox:1.36
            command: ["sleep", "3600"]
