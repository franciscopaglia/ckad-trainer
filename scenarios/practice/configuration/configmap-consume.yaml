id: configmap-consume
title: "Consume a ConfigMap from a Pod"
mode: practice
domain: configuration
weight: 1
estimated_minutes: 5
randomize: true
references:
  - https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/

# Value randomness: the ConfigMap name, key and value differ each run.
params:
  cmName: { pick: [app-config, web-config, db-config] }
  key: { pick: [DATABASE_URL, LOG_LEVEL, FEATURE_FLAG, API_PORT] }
  value: { pick: ["postgres://db:5432", "debug", "true", "8080"] }
  podName: { pattern: "consumer-{{randInt 100 999}}" }

# The ConfigMap already exists when the user starts.
setup:
  manifests:
    - |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: {{.cmName}}
        namespace: {{.ns}}
      data:
        {{.key}}: "{{.value}}"

# Variant randomness: one of three ways to consume the ConfigMap is drawn.
variants:
  - name: envFrom-whole
    weight: 2
    prompt: |
      In `{{.ns}}`, ConfigMap `{{.cmName}}` already exists. Create a Pod
      `{{.podName}}` (image `busybox:1.36`, command `sleep 3600`) that loads
      **all** keys of `{{.cmName}}` as environment variables (use `envFrom`).
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          - path: '{.spec.containers[0].envFrom[0].configMapRef.name}'
            equals: "{{.cmName}}"

  - name: single-key
    weight: 1
    prompt: |
      In `{{.ns}}`, expose only key `{{.key}}` of ConfigMap `{{.cmName}}` as the
      environment variable `{{.key}}` in a new Pod `{{.podName}}`
      (image `busybox:1.36`, command `sleep 3600`).
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          - path: '{.spec.containers[0].env[?(@.name=="{{.key}}")].valueFrom.configMapKeyRef.name}'
            equals: "{{.cmName}}"
          - path: '{.spec.containers[0].env[?(@.name=="{{.key}}")].valueFrom.configMapKeyRef.key}'
            equals: "{{.key}}"

  - name: volume-mount
    weight: 1
    prompt: |
      In `{{.ns}}`, mount ConfigMap `{{.cmName}}` as a volume at `/etc/config`
      in a new Pod `{{.podName}}` (image `busybox:1.36`, command `sleep 3600`).
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          - path: '{.spec.volumes[?(@.configMap.name=="{{.cmName}}")].name}'
            exists: true
          - path: '{.spec.containers[0].volumeMounts[?(@.mountPath=="/etc/config")].name}'
            exists: true

solution:
  description: |
    {{if eq .variant "envFrom-whole"}}envFrom loads every key of the ConfigMap as environment variables.{{end}}{{if eq .variant "single-key"}}valueFrom.configMapKeyRef injects a single named key as one env var.{{end}}{{if eq .variant "volume-mount"}}A ConfigMap volume writes each key as a file under the mountPath.{{end}}
  manifests:
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: {{.podName}}
        namespace: {{.ns}}
      spec:
        restartPolicy: Never
        containers:
          - name: main
            image: busybox:1.36
            command: ["sleep", "3600"]
            {{- if eq .variant "envFrom-whole"}}
            envFrom:
              - configMapRef:
                  name: {{.cmName}}
            {{- end}}
            {{- if eq .variant "single-key"}}
            env:
              - name: {{.key}}
                valueFrom:
                  configMapKeyRef:
                    name: {{.cmName}}
                    key: {{.key}}
            {{- end}}
            {{- if eq .variant "volume-mount"}}
            volumeMounts:
              - name: cfg
                mountPath: /etc/config
            {{- end}}
        {{- if eq .variant "volume-mount"}}
        volumes:
          - name: cfg
            configMap:
              name: {{.cmName}}
        {{- end}}
