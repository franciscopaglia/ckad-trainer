id: volume-subpath
title: "Mount a single config file with subPath"
mode: practice
domain: configuration
weight: 1
estimated_minutes: 4
randomize: true
references:
  - https://kubernetes.io/docs/concepts/storage/volumes/#using-subpath

params:
  podName: { pattern: "subpath-{{randInt 100 999}}" }
  cmName: { pick: [nginx-conf, app-conf, site-conf] }
  fileKey: { pick: [app.conf, settings.yaml, nginx.conf] }

setup:
  manifests:
    - |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: {{.cmName}}
        namespace: {{.ns}}
      data:
        {{.fileKey}}: "key=value"

prompt: |
  In `{{.ns}}`, create a Pod `{{.podName}}` (image `busybox:1.36`, command
  `sleep 3600`) that mounts ONLY the key `{{.fileKey}}` of ConfigMap
  `{{.cmName}}` as the single file `/etc/config/{{.fileKey}}` — using `subPath`
  so it doesn't shadow the rest of `/etc/config`.

hints:
  - "subPath selects one key/file from the volume and mounts it as a file."
  - "Without subPath, mounting at a directory hides everything else already there."

verify:
  - kind: Pod
    name: "{{.podName}}"
    assert:
      - path: "{.spec.volumes[*].configMap.name}"
        contains: "{{.cmName}}"
      - path: "{.spec.containers[0].volumeMounts[*].mountPath}"
        contains: "/etc/config/{{.fileKey}}"
      - path: "{.spec.containers[0].volumeMounts[*].subPath}"
        contains: "{{.fileKey}}"

solution:
  description: |
    subPath mounts one file from a volume at a specific path, leaving the rest of
    the target directory intact — the usual way to drop a single config file into
    an existing dir.
  manifests:
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: {{.podName}}
        namespace: {{.ns}}
      spec:
        restartPolicy: Never
        volumes:
          - name: cfg
            configMap:
              name: {{.cmName}}
        containers:
          - name: app
            image: busybox:1.36
            command: ["sleep", "3600"]
            volumeMounts:
              - name: cfg
                mountPath: /etc/config/{{.fileKey}}
                subPath: {{.fileKey}}
