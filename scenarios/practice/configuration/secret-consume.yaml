id: secret-consume
title: "Consume a Secret from a Pod"
mode: practice
domain: configuration
weight: 1
estimated_minutes: 5
randomize: true
references:
  - https://kubernetes.io/docs/concepts/configuration/secret/

params:
  secretName: { pick: [db-secret, api-secret, tls-secret] }
  key: { pick: [PASSWORD, API_KEY, TOKEN] }
  value: { pick: ["s3cr3t", "abc123xyz", "hunter2"] }
  podName: { pattern: "sec-{{randInt 100 999}}" }

# The Secret already exists (created with stringData, i.e. plaintext input).
setup:
  manifests:
    - |
      apiVersion: v1
      kind: Secret
      metadata:
        name: {{.secretName}}
        namespace: {{.ns}}
      type: Opaque
      stringData:
        {{.key}}: "{{.value}}"

variants:
  - name: single-key
    weight: 2
    prompt: |
      In `{{.ns}}`, expose key `{{.key}}` of Secret `{{.secretName}}` as the
      environment variable `{{.key}}` in a new Pod `{{.podName}}`
      (image `busybox:1.36`, command `sleep 3600`).
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          - path: '{.spec.containers[0].env[?(@.name=="{{.key}}")].valueFrom.secretKeyRef.name}'
            equals: "{{.secretName}}"
          - path: '{.spec.containers[0].env[?(@.name=="{{.key}}")].valueFrom.secretKeyRef.key}'
            equals: "{{.key}}"

  - name: envFrom-whole
    weight: 1
    prompt: |
      In `{{.ns}}`, create a Pod `{{.podName}}` (image `busybox:1.36`, command
      `sleep 3600`) that loads **all** keys of Secret `{{.secretName}}` as
      environment variables (use `envFrom`).
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          # envFrom[*] + contains: don't fail on extra envFrom entries or ordering.
          - path: '{.spec.containers[0].envFrom[*].secretRef.name}'
            contains: "{{.secretName}}"

  - name: volume-mount
    weight: 1
    prompt: |
      In `{{.ns}}`, mount Secret `{{.secretName}}` as a volume at `/etc/secret`
      in a new Pod `{{.podName}}` (image `busybox:1.36`, command `sleep 3600`).
    verify:
      - kind: Pod
        name: "{{.podName}}"
        assert:
          - path: '{.spec.volumes[?(@.secret.secretName=="{{.secretName}}")].name}'
            exists: true
          - path: '{.spec.containers[0].volumeMounts[?(@.mountPath=="/etc/secret")].name}'
            exists: true

solution:
  description: |
    Note the asymmetry: a Secret volume uses `secret.secretName` (a ConfigMap
    volume uses `configMap.name`). Env injection uses `secretKeyRef` for one key
    or `envFrom: [{secretRef: ...}]` for all of them.
  manifests:
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: {{.podName}}
        namespace: {{.ns}}
      spec:
        restartPolicy: Never
        containers:
          - name: main
            image: busybox:1.36
            command: ["sleep", "3600"]
            {{- if eq .variant "single-key"}}
            env:
              - name: {{.key}}
                valueFrom:
                  secretKeyRef:
                    name: {{.secretName}}
                    key: {{.key}}
            {{- end}}
            {{- if eq .variant "envFrom-whole"}}
            envFrom:
              - secretRef:
                  name: {{.secretName}}
            {{- end}}
            {{- if eq .variant "volume-mount"}}
            volumeMounts:
              - name: sec
                mountPath: /etc/secret
            {{- end}}
        {{- if eq .variant "volume-mount"}}
        volumes:
          - name: sec
            secret:
              secretName: {{.secretName}}
        {{- end}}
