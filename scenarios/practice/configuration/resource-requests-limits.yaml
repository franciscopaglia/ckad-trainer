id: resource-requests-limits
title: "Set container resource requests and limits"
mode: practice
domain: configuration
weight: 1
estimated_minutes: 4
randomize: true
references:
  - https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/

params:
  podName: { pattern: "rsrc-{{randInt 100 999}}" }
  cpuReq: { pick: ["100m", "200m", "250m"] }
  memReq: { pick: ["64Mi", "128Mi", "256Mi"] }
  cpuLim: { pick: ["500m", "1"] }
  memLim: { pick: ["256Mi", "512Mi"] }

prompt: |
  In `{{.ns}}`, create a Pod `{{.podName}}` (image `busybox:1.36`,
  command `sleep 3600`) whose single container `app` sets:
    - requests: cpu `{{.cpuReq}}`, memory `{{.memReq}}`
    - limits:   cpu `{{.cpuLim}}`, memory `{{.memLim}}`

hints:
  - "kubectl explain pod.spec.containers.resources"
  - "requests are the guaranteed minimum; limits are the hard cap."

verify:
  - kind: Pod
    name: "{{.podName}}"
    assert:
      - path: "{.spec.containers[0].resources.requests.cpu}"
        equals: "{{.cpuReq}}"
      - path: "{.spec.containers[0].resources.requests.memory}"
        equals: "{{.memReq}}"
      - path: "{.spec.containers[0].resources.limits.cpu}"
        equals: "{{.cpuLim}}"
      - path: "{.spec.containers[0].resources.limits.memory}"
        equals: "{{.memLim}}"

solution:
  description: |
    requests/limits live under each container's `resources`. CPU is in cores or
    millicores (250m = 0.25 core); memory uses binary suffixes (Mi, Gi).
  manifests:
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: {{.podName}}
        namespace: {{.ns}}
      spec:
        restartPolicy: Never
        containers:
          - name: app
            image: busybox:1.36
            command: ["sleep", "3600"]
            resources:
              requests:
                cpu: "{{.cpuReq}}"
                memory: "{{.memReq}}"
              limits:
                cpu: "{{.cpuLim}}"
                memory: "{{.memLim}}"
