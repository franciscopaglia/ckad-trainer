id: configmap-volume-items
title: "Mount a single ConfigMap key to a custom file path"
mode: practice
domain: configuration
weight: 1
estimated_minutes: 5
randomize: false
references:
  - https://kubernetes.io/docs/tasks/configure-pod-container/configure-pod-configmap/#add-configmap-data-to-a-volume

setup:
  manifests:
    - |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: app-config
        namespace: {{.ns}}
      data:
        app.properties: "color=blue"
        log.level: "info"

prompt: |
  In `{{.ns}}`, ConfigMap `app-config` has two keys. Create a Pod `reader`
  (image `busybox:1.36`, command `sleep 3600`) that mounts a ConfigMap volume
  but projects ONLY the key `app.properties` to the file
  `/config/application.properties` (use `items` with `key`/`path`).

hints:
  - "volumes[].configMap.items lets you pick keys and rename them to file paths."
  - "the file lands at mountPath + path: /config + application.properties."

verify:
  - kind: Pod
    name: reader
    assert:
      - path: "{.spec.volumes[*].configMap.name}"
        contains: "app-config"
      - path: "{.spec.volumes[*].configMap.items[*].key}"
        contains: "app.properties"
      - path: "{.spec.volumes[*].configMap.items[*].path}"
        contains: "application.properties"
      - path: '{.spec.containers[0].volumeMounts[?(@.mountPath=="/config")].name}'
        exists: true

solution:
  description: |
    Without `items`, every key becomes a file named after the key. With `items`
    you select specific keys and choose their relative file `path`, so the data
    lands at mountPath + path.
  manifests:
    - |
      apiVersion: v1
      kind: Pod
      metadata:
        name: reader
        namespace: {{.ns}}
      spec:
        restartPolicy: Never
        containers:
          - name: app
            image: busybox:1.36
            command: ["sleep", "3600"]
            volumeMounts:
              - name: cfg
                mountPath: /config
        volumes:
          - name: cfg
            configMap:
              name: app-config
              items:
                - key: app.properties
                  path: application.properties
