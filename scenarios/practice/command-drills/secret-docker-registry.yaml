id: secret-docker-registry
title: "Create a docker-registry pull Secret"
mode: practice
domain: security
weight: 1
estimated_minutes: 3
randomize: true
references:
  - https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/

params:
  secretName: { pick: [regcred, pull-secret, registry-key] }
  server: { pick: ["registry.example.com", "ghcr.io", "docker.io"] }
  username: { pick: [deployer, ci-bot, robot] }

prompt: |
  In `{{.ns}}`, imperatively create a docker-registry Secret `{{.secretName}}`
  for server `{{.server}}`, username `{{.username}}`, password `pass123`,
  email `dev@example.com`.

hints:
  - "kubectl create secret docker-registry NAME --docker-server= --docker-username= --docker-password= --docker-email="
  - "the result has type kubernetes.io/dockerconfigjson"

verify:
  - kind: Secret
    name: "{{.secretName}}"
    assert:
      - path: "{.type}"
        equals: "kubernetes.io/dockerconfigjson"
      - path: '{.data.\.dockerconfigjson}'
        exists: true

solution:
  description: |
    A docker-registry secret stores registry credentials as a single
    `.dockerconfigjson` key; reference it from a Pod via imagePullSecrets.
  commands:
    - "kubectl create secret docker-registry {{.secretName}} -n {{.ns}} --docker-server={{.server}} --docker-username={{.username}} --docker-password=pass123 --docker-email=dev@example.com"
